name: poise_ai
description: Crypto trading risk management with AI assistance.
publish_to: none
version: 1.0.1+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.0

  # Navigation
  go_router: ^14.6.3

  # Network
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.2

  # Storage / Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^1.2.0

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # Bottom sheets
  smooth_sheets: ^0.17.0

  # Toast notifications
  toastification: ^2.3.0

  # Skeleton loading
  skeletonizer: ^2.1.3

  # UI utilities
  gap: ^3.0.1
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  decimal: ^3.2.1
  timeago: ^3.7.0

  # Forms
  reactive_forms: ^17.0.1

  # OTP input
  pinput: ^5.0.1

  # Misc
  collection: ^1.19.1
  equatable: ^2.0.7
  logger: ^2.5.0
  package_info_plus: ^8.3.0
  google_fonts: ^8.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.4
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.3.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
